let lang='ja';
function setLang(l){
lang=l;const t=trans[l];
document.getElementById('page-title').textContent=t.title;
document.getElementById('stats-label').textContent=t.statsLabel;
document.getElementById('stats-unit').textContent=t.statsUnit;
document.getElementById('stats-source').textContent=t.statsSource;
document.getElementById('opt-all').textContent=t.optAll;
document.getElementById('searchInput').placeholder=t.searchPlaceholder;
document.querySelectorAll('.lang-switch button').forEach(b=>b.classList.remove('active'));
document.getElementById('btn-'+l).classList.add('active');
render(props);
}
function getSrcCls(s){return'source-'+s.toLowerCase().replace('!','')}
function render(data){
const g=document.getElementById('propertyGrid'),t=trans[lang];
g.innerHTML='';
data.forEach(p=>{
const d=p[lang]||p.j;
const img=p.img?'<img class="property-image" src="'+p.img+'" alt="'+d.n+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">':'';
const noImg=p.img?'':'<div class="no-image">'+t.noImage+'</div>';
const card=document.createElement('div');
card.className='property-card';
card.innerHTML=img+noImg+'<div class="property-info"><div class="property-name">'+d.n+'</div><div class="property-price">'+p.p+t.priceUnit+'</div><div class="property-details"><div>📍 '+t.address+': '+d.a+'</div><div>📐 '+t.layout+': '+d.l+' | '+t.area+': '+d.s+'</div><div>💰 '+t.feeLabel+': '+p.m+'</div></div><span class="source '+getSrcCls(p.src)+'">'+p.src+'</span></div>';
g.appendChild(card);
});
document.getElementById('total').textContent=data.length;
}
function filterData(){
const s=document.getElementById('sourceFilter').value,v=document.getElementById('searchInput').value.toLowerCase();
const f=props.filter(p=>{const d=p[lang]||p.j;return(s==='all'||p.src===s)&&(d.n.toLowerCase().includes(v)||d.a.toLowerCase().includes(v))});
render(f);
}
render(props);
